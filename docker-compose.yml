version: "3.8"

services:
  # =========================================
  # FRONTEND (Bootstrap via npm + routes.js,  servi par Vite)
  # =========================================
  frontend:
    image: node:20-alpine
    container_name: app_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - ./frontend/node_modules:/app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npm run dev"    
    networks:
      - app_net

  # =========================================
  # BACKEND (API Symfony)
  # =========================================
  nginx-backend:
    image: nginx:1.27-alpine
    container_name: app_backend_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend/src:/var/www/html
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app_net

  php:
    build:
      context: ./backend/docker/php
      dockerfile: Dockerfile
    container_name: php_app
    volumes:
      - ./backend/src:/var/www/html
    environment:
      MONGODB_URL: "mongodb://symfony:symfony@mongodb:27017/vite_et_gourmand_db?authSource=admin"
      MONGODB_DB: "vite_et_gourmand_db"
      DATABASE_URL: "mysql://symfony:symfony@database:3306/vite_et_gourmand_db?serverVersion=8.0"
      APP_ENV: dev
      # Autorise le frontend (port 3000) à appeler l'API (CORS)
      CORS_ALLOW_ORIGIN: "http://localhost:3000"
    depends_on:
      - mongodb
      - database
    networks:
      - app_net

  # --- MongoDB ---
  mongodb:
    image: mongo:7
    container_name: app_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: symfony
      MONGO_INITDB_ROOT_PASSWORD: symfony
      MONGO_INITDB_DATABASE: vite_et_gourmand_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app_net

  mongo-express:
    image: mongo-express:latest
    container_name: app_mongo_express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: symfony
      ME_CONFIG_MONGODB_ADMINPASSWORD: symfony
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - app_net

  # --- MySQL ---
  database:
    image: mysql:8.0
    container_name: app_database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vite_et_gourmand_db
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: app_phpmyadmin
    environment:
      PMA_HOST: database
      PMA_USER: symfony
      PMA_PASSWORD: symfony
    ports:
      - "8082:80"
    depends_on:
      - database
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  mongo_data:
  db_data: