<div class="hero-scene text-center text-white">
    <div class="text-center hero-scene-content">
        <h1>Mon compte</h1>
    </div>
</div>

<div class="container mt-5">
    <form>
        <div class="col-md-3">
            <label for="NomInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NomInput" placeholder="Votre nom" value="John Doe">
        </div>
        <div class="col-md-3">
            <label for="PrenomInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="PrenomInput" placeholder="Votre prénom" value="John">
        </div>
        <div class="col-md-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="EmailInput" placeholder="Votre email" value="john.doe@example.com">
        </div>
        <div class="col-md-3">
            <label for="GsmInput" class="form-label">Téléphone</label>
            <input type="tel" class="form-control" id="GsmInput" placeholder="Votre téléphone" value="01 23 45 67 89">
        </div>
        <div class="col-md-3">
            <label for="AdresseInput" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="AdresseInput" placeholder="Votre adresse" value="123 Rue de la Paix">
        </div>
        <div class="col-md-3">
            <label for="CommandeInput" class="form-label">Commandes</label>
            <input type="text" class="form-control" id="CommandeInput" placeholder="Vos commandes" value="Vous n'avez pas encore passé de commande.">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-primary">Modifier vos informations</button>
            <button type="button" class="btn btn-danger">Supprimer mon compte</button>
        </div>
    </form>
    <div class="text-center pt-3">
        <a href="/editPassword">Cliquez ici pour modifier votre mot de passe</a>
    </div>
    <div>
        <h2 class="mt-5">Historique de commandes</h2>
        <p>Vous n'avez pas encore passé de commande.</p>
    </div>    
</div>
